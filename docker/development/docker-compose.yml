services:
  db:
    image: postgres:16-alpine
    container_name: public_admin_db
    volumes:
      - public_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: admin_db
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - admin_network

  backend:
    build:
      context: ../../
      dockerfile: docker/build/backend.Dockerfile
    container_name: public_admin_backend
    volumes:
      - ../../services/backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: demo-django-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_URL: postgresql://admin_user:admin_password@db:5432/admin_db
      DATABASE_SSL: "False"
      CORS_ALLOWED_ORIGINS: http://localhost:3001,http://127.0.0.1:3001
    command: >
      sh -c "until python manage.py migrate; do
        echo 'Waiting for database...';
        sleep 2;
      done;
      python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - admin_network

  frontend:
    build:
      context: ../../
      dockerfile: docker/build/frontend.Dockerfile
    container_name: public_admin_frontend
    ports:
      - "3001:3000"
    volumes:
      - ../../services/frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      AUTH_SECRET: demo-nextauth-secret-not-for-production
      NEXTAUTH_URL: http://localhost:3001
      AUTH_GOOGLE_ID: ""
      AUTH_GOOGLE_SECRET: ""
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      INTERNAL_API_URL: http://backend:8000/api
      NEXT_PUBLIC_USE_MOCKS: "true"
      NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: "false"
    depends_on:
      - backend
    networks:
      - admin_network

volumes:
  public_postgres_data:

networks:
  admin_network:
    driver: bridge
    name: admin_network
